# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  # push:
  #   branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs: 
  python-test: # jobs 1

    #runs-on: ubuntu-latest # worker/agent github hosted
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps: # task inside a job abcd
    - uses: actions/checkout@v4
    - name: Set up Python
      run: |
       python3 --version
    - name: Install dependencies
      run: |
        sudo yum install python3-pip -y
        pip3 install --upgrade pip
        pip3 install flake8 pytest
        if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest --cov=app --cov-report=xml:coverage.xml
    
    - name: upload the coverage file in artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report     # Name of the saved artifact
        path: coverage.xml                   # File, directory, or wildcard pattern to upload

  sonarqube-analysis: #job2
    name: Build and analyze
    needs: python-test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: download coverage report from artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: test coverage xml file
        run: |
          ls -l
          cat coverage.xml
      - uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-image-build-and-push: #job3
    runs-on: ubuntu-latest # worker/agent github hosted
    needs: ['python-test','sonarqube-analysis'] # job3 depends on job2 
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: him111/gfgpython43cicd:latest
